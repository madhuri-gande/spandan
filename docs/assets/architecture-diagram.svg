  <line x1="170" y1="182" x2="218" y2="200" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="162" x2="400" y2="174" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="305" y1="232" x2="350" y2="248" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="232" x2="450" y2="248" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="304" x2="305" y2="318" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="304" x2="495" y2="318" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="276" x2="658" y2="168" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="276" x2="658" y2="272" stroke="#5a6068" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="232" x2="580" y2="232" stroke="#5a6068" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <rect x="40" y="400" width="840" height="96" rx="12" fill="#fff" stroke="#e0e4ea" filter="url(#shadow)"/>
  <text x="460" y="426" text-anchor="middle" font-size="13" font-weight="700" fill="#c8102e">Autonomous loop (every ~30s)</text>
  <text x="460" y="452" text-anchor="middle" font-size="12" fill="#22222b">Forecast 90-day pipeline | ML rank | Bedrock email | MailPit | YES/NO | confirm or next donor</text>
  <text x="460" y="478" text-anchor="middle" font-size="11" fill="#5a6068">Live: http://98.84.159.117 | MailPit: /mail | GitHub: github.com/madhuri-gande/spandan</text>
