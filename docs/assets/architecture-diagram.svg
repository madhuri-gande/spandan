  <rect width="920" height="520" fill="url(#bg)"/>
  <text x="460" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#22222b">Spandan - System Architecture</text>
  <text x="460" y="58" text-anchor="middle" font-size="12" fill="#5a6068">EC2 t3.small | nginx :80 | us-east-1</text>

  <g filter="url(#shadow)">
    <rect x="40" y="88" width="130" height="52" rx="10" fill="#fff" stroke="#e0e4ea"/>
